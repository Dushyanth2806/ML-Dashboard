services:
  - type: web
    name: ml-dashboard-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ALLOWED_ORIGINS
        value: https://ml-dashboard-cyan.vercel.app,http://localhost:5173
      - key: FLASK_DEBUG
        value: "false"
